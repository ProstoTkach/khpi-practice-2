<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile | UserFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body data-page="edit-profile">
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="index.html">UserFlow</a>
        <nav class="nav-links" aria-label="Main navigation">
          <a href="index.html">Welcome</a>
          <a href="create-user.html">Create user</a>
          <a href="users.html">User list</a>
          <a href="profile.html">Profile & scores</a>
          <a href="edit-profile.html" class="active">Edit profile</a>
          <a href="delete-user.html">Delete user</a>
        </nav>
      </aside>

      <main class="content">
        <section class="card form-card">
          <h1>Edit profile</h1>
          <p class="muted">Create or update profile with API endpoints.</p>

          <form id="editProfileForm" class="form-grid" novalidate>
            <label for="profileId">Profile ID (for update)</label>
            <input id="profileId" type="number" min="1" placeholder="Optional for create" />

            <label for="profileUserId">User ID</label>
            <input id="profileUserId" type="number" min="1" required />

            <label for="bio">Bio</label>
            <textarea id="bio" rows="4" placeholder="Short bio"></textarea>

            <label for="avatarUrl">Avatar URL</label>
            <input id="avatarUrl" type="url" placeholder="https://..." />

            <div class="button-row">
              <button id="createProfileBtn" type="button" class="btn primary">Create profile</button>
              <button id="updateProfileBtn" type="button" class="btn ghost">Update profile</button>
            </div>
          </form>
        </section>
        <p id="globalMessage" class="status-message" role="status" aria-live="polite"></p>
      </main>
    </div>
  </body>
</html>
