<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Create your account to access our platform and start building faster."
    />
    <title>Create Account | NovaFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="page">
      <section class="register-card" aria-labelledby="register-title">
        <header class="card-header">
          <p class="eyebrow">Get started in minutes</p>
          <h1 id="register-title">Create your account</h1>
          <p class="subtitle">
            Join thousands of teams using NovaFlow to ship better products.
          </p>
        </header>

        <form id="registrationForm" class="register-form" novalidate>
          <div class="field-group">
            <label for="firstName">First Name</label>
            <input
              id="firstName"
              name="firstName"
              type="text"
              autocomplete="given-name"
              aria-describedby="firstNameError"
              required
            />
            <p class="error-message" id="firstNameError" aria-live="polite"></p>
          </div>

          <div class="field-group">
            <label for="lastName">Last Name</label>
            <input
              id="lastName"
              name="lastName"
              type="text"
              autocomplete="family-name"
              aria-describedby="lastNameError"
              required
            />
            <p class="error-message" id="lastNameError" aria-live="polite"></p>
          </div>

          <div class="field-group">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              aria-describedby="emailError"
              required
            />
            <p class="error-message" id="emailError" aria-live="polite"></p>
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              aria-describedby="passwordHint passwordError"
              required
            />
            <p class="hint-text" id="passwordHint">
              Use at least 6 characters.
            </p>
            <p class="error-message" id="passwordError" aria-live="polite"></p>
          </div>

          <button type="submit" class="submit-btn">Create account</button>
        </form>

        <p
          id="formStatus"
          class="form-status"
          role="status"
          aria-live="polite"
        ></p>
      </section>
    </main>
  </body>
</html>
